[tool]
id = "com.thelightphone.musicapp"
label = "Music"
versionCode = 7
versionName = "0.3.4"
# READ_MEDIA_AUDIO: reads the device's music library via MediaStore.
# FOREGROUND_SERVICE(_MEDIA_PLAYBACK) + POST_NOTIFICATIONS: keeps audio playing
# in the background and publishes a MediaSession for lock-screen controls.
permissions = [
    "android.permission.READ_MEDIA_AUDIO",
    "android.permission.FOREGROUND_SERVICE",
    "android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK",
    "android.permission.POST_NOTIFICATIONS",
]
# com.lightos on real hardware; com.thelightphone.sdk.emulator on the emulator.
serverPackage = "com.lightos"
